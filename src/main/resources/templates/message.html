<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link type="text/css" href="/css/messageCss.css" rel="stylesheet" >
<script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script type="text/javascript" th:inline="javascript">
	$(document).ready(function(){


		let stompClient=null;

	    function connect(){
		    const socket = new SockJS('/chat');
		    stompClient = Stomp.over(socket);
			console.log("socket = ", socket);
			console.log("stompClient = ", stompClient);

		    stompClient.connect({}, function(){
				console.log("inside");
			    stompClient.subscribe('/topic/messages', function(msg){
				    const message = JSON.parse(msg.body);
					document.querySelector('.message').value = '';
				    appendMessage(message);
					console.log("msg = " + message);
			    })
		    })
	    }

		connect();


		function sendMessage(id){
		    var text = document.getElementsByClassName('message')[0].value
		    const currentUserId = /*[[${session.userId}]]*/ ''
		    stompClient.send("/app/chat", {}, JSON.stringify({
                message: text,
                groupId: id,
				sentBy: currentUserId
            }
	    ));
		
	    }

	window.checkKey = function(groupId, event){
		if(event.key=='Enter'){
			sendMessage(groupId);
		}
	}

	

	function appendMessage(message){

		const currentUserId = /*[[${session.userId}]]*/ ''
		const displayImage = /*[[${session.displayImage}]]*/ ''
		const chatList = document.querySelector('.chat-list');
		const chatLi = document.createElement('li');
		if(message.senderId==currentUserId){
			chatLi.className = 'out';
		}else{
			chatLi.className = 'in';
		}
		chatList.appendChild(chatLi);

		const imgDiv = document.createElement('div');
		imgDiv.className = 'chat-img';
		chatLi.appendChild(imgDiv);

		const userImg = document.createElement('img');
		userImg.alt='username';
		if(displayImage!=null && message.senderId==currentUserId){
			userImg.src = displayImage;
		}else{
            userImg.src=message.displayPicture;
		}
		imgDiv.appendChild(userImg);

		const chatBodyDiv = document.createElement('div');
		chatBodyDiv.className='chat-body';
		chatLi.appendChild(chatBodyDiv);

		const chatMessageDiv = document.createElement('div');
		chatMessageDiv.className = 'chat-message';
		chatBodyDiv.appendChild(chatMessageDiv);

		const header = document.createElement('h5');
		header.textContent = message.senderUsername;
		chatMessageDiv.appendChild(header);

		const chatMessage = document.createElement('p');
		chatMessage.textContent = message.message;
		chatMessageDiv.appendChild(chatMessage);


	}


		const allMessage = /*[[${message}]]*/ '';
		const currentUserId = /*[[${session.userId}]]*/ ''

		const chatList = document.querySelector('.chat-list');
		Object.entries(allMessage).forEach((ob)=>{
			const chatLi = document.createElement('li');
			if(ob[1].senderId==currentUserId){
				chatLi.className = 'out';
			}else{
				chatLi.className = 'in';
			}
		    chatList.appendChild(chatLi);

			const imgDiv = document.createElement('div');
		    imgDiv.className = 'chat-img';
		    chatLi.appendChild(imgDiv);

		    const userImg = document.createElement('img');
		    userImg.alt='username';
		    userImg.src=ob[1].displayPicture;
		    imgDiv.appendChild(userImg);

		    const chatBodyDiv = document.createElement('div');
		    chatBodyDiv.className='chat-body';
		    chatLi.appendChild(chatBodyDiv);

		    const chatMessageDiv = document.createElement('div');
		    chatMessageDiv.className = 'chat-message';
		    chatBodyDiv.appendChild(chatMessageDiv);

		    const header = document.createElement('h5');
		    header.textContent = ob[1].senderName;
		    chatMessageDiv.appendChild(header);

		    const chatMessage = document.createElement('p');
		    chatMessage.textContent = ob[1].content;
		    chatMessageDiv.appendChild(chatMessage);

		})


	})

	
</script>
<div class="container content">
    <div class="row">
        <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12 col-12">
        	<div class="card">
        		<div class="card-header">
					Chat
				<div class="dropdown">
					<div class="dropdown-button">Options</div>
					<div class="dropdown-content">
						<div th:with="userLoggedIn=${session.username!=null?true:false}">
							<a href="/menu/logout"  class="no-underline white-font">
								<span th:if="${userLoggedIn}">Logout</span>
								<span th:unless="${userLoggedIn}">Login</span>
							</a>
						</div>
					</div>
				</div>
				</div>
        		<div class="card-body">
        			<ul class="chat-list">
        				
        			</ul>
        		</div>
        	</div>
        </div>
		<div class="messageDiv" th:if="${session.userId!=null}">
			<input id="messageContent" type="textbox" class="message" th:attr="data-group-id=${groupId}" onkeypress="checkKey(this.dataset.groupId, event)">
			<input type="button" class="btnSend" value=">" th:attr="data-group-id=${groupId}" onclick="sendMessage(this.dataset.groupId)">
			<div class="developerMsg">
				<marquee>Developed by Gmi Shelby</marquee>
			</div>
		</div>
    </div>
</div>
